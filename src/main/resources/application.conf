bridge {
  transposition-table {
    # Maximum number of entries a double-dummy search's transposition table will hold
    # before it stops accepting new ones (see FlatTTCache.maxSize in Gambit). Unbounded
    # growth on a hard real deal can push heap usage into an OutOfMemoryError well before
    # the node budget is reached; capping it trades some cache misses late in a long
    # search for a bounded memory footprint. Override with
    # -Dbridge.transposition-table.max-size=<n> without editing this file.
    max-size = 800000
  }

  # Node budget for a single iterative-deepening iteration (AlphaBetaPlayer.withMaxNodes).
  # Resets at the start of every iteration, so this is a per-depth budget, not a total one.
  # Used by the object-graph engine (Whist.analyzeDoubleDummy); see bitboard.nodes-per-iteration
  # below for the bit engine's own (higher) budget. Override with -Dbridge.nodes-per-iteration=<n>.
  nodes-per-iteration = 1000000

  bitboard {
    # The bit engine (BitAnalysis) measurably uses far less memory per node than the
    # object-graph engine (see doc/DoubleDummyDesign.md's "Empirical Performance Finding"),
    # so it can afford a bigger transposition table and node budget than the shared values
    # above, which are sized for the object-graph engine's much heavier per-node cost.
    #
    # These specific values were chosen empirically, not just increased on the general
    # principle that more memory is available: raising nodes-per-iteration ALONE (with the
    # table capped at the size above) did almost nothing, since a full table stops caching
    # and the search just thrashes without transposition reuse -- table size is the actual
    # lever, node budget only matters once the table is sized to match. At 3,000,000/
    # 5,000,000, a known synthetic eleven-card end position that previously only reached an
    # unproven Partial guess now resolves to a fully-proven Exact result in ~11s, peak heap
    # ~2.4GB (on an 8GB heap) -- consistent with the existing "5x node budget" finding
    # elsewhere in this file's sibling doc. A harder twelve-card case still doesn't fully
    # resolve at these settings (needs roughly 8,000,000/10,000,000, peak heap ~5.1GB) --
    # deliberately not adopted as the default, since that halves the remaining safety
    # margin on an 8GB heap for one specific known-hard case; use an explicit maxNodes
    # override for that if it's ever needed.
    transposition-table {
      max-size = 3000000
    }
    nodes-per-iteration = 5000000
  }

  # Half-width of the root aspiration window (AlphaBetaWindow(-w, w)) used by
  # analyzeDoubleDummy's binary "does declarer make N tricks" search. This is the one
  # value to tune here -- BridgeConfig.heuristicScale is *derived* from it, not configured
  # separately, since the two must stay coupled for the technique to remain sound (see
  # BridgeConfig's doc comments). Override with -Dbridge.aspiration-window=<n>.
  aspiration-window = 0.5
}
