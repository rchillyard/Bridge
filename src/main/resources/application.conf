bridge {
  transposition-table {
    # Maximum number of entries a double-dummy search's transposition table will hold
    # before it stops accepting new ones (see FlatTTCache.maxSize in Gambit). Unbounded
    # growth on a hard real deal can push heap usage into an OutOfMemoryError well before
    # the node budget is reached; capping it trades some cache misses late in a long
    # search for a bounded memory footprint. Override with
    # -Dbridge.transposition-table.max-size=<n> without editing this file.
    max-size = 800000
  }
}
