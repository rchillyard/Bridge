# Scala CircleCI 2.1 configuration file
version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:23.0

    working_directory: ~/repo

    environment:
      JVM_OPTS: -Xmx3200m
      TERM: dumb

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "build.sbt" }}
            - v1-dependencies-

      - run:
          name: Compile
          command: sbt Test/compile

      - save_cache:
          paths:
            - ~/.sbt
            - ~/.ivy2/cache
            - ~/.cache/coursier
          key: v1-dependencies-{{ checksum "build.sbt" }}

      - run:
          name: Test (fast)
          command: sbt "testOnly -- -l org.scalatest.tags.Slow"

  slow-tests:
    docker:
      - image: cimg/openjdk:23.0

    working_directory: ~/repo

    environment:
      JVM_OPTS: -Xmx3200m
      TERM: dumb

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "build.sbt" }}
            - v1-dependencies-

      - run:
          name: Test (slow)
          command: sbt "testOnly -- -n org.scalatest.tags.Slow"

workflows:
  version: 2
  build-and-test:
    jobs:
      - build
      - slow-tests:
          requires:
            - build
          filters:
            branches:
              only: master