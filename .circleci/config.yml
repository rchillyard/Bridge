# Scala CircleCI 2.1 configuration file
version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:23.0
    resource_class: large

    working_directory: ~/repo

    environment:
      JVM_OPTS: -Xmx3200m
      TERM: dumb

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "build.sbt" }}
            - v1-dependencies-

      - run:
          name: Compile
          command: sbt Test/compile

      - save_cache:
          paths:
            - ~/.sbt
            - ~/.ivy2/cache
            - ~/.cache/coursier
          key: v1-dependencies-{{ checksum "build.sbt" }}

      - run:
          name: Test (fast)
          command: sbt "testOnly * -- -l com.phasmidsoftware.bridge.SlowTest"

      # Not run in CI yet: the `IT` (src/it) suite isn't invoked here at all -- see
      # doc/DoubleDummyDesign.md, real-deal/larger-end-position tests, minutes each.
      # - run:
      #     name: Integration test (fast, excludes Slow-tagged)
      #     command: sbt "IT/testOnly * -- -l com.phasmidsoftware.bridge.SlowTest"

  slow-tests:
    docker:
      - image: cimg/openjdk:23.0
    resource_class: large

    working_directory: ~/repo

    environment:
      JVM_OPTS: -Xmx3200m
      TERM: dumb

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "build.sbt" }}
            - v1-dependencies-

      - run:
          name: Test (Slow-tagged only)
          command: sbt "testOnly * -- -n com.phasmidsoftware.bridge.SlowTest"

workflows:
  version: 2
  build-and-test:
    jobs:
      - build
      - slow-tests:
          requires:
            - build
          filters:
            branches:
              only: master